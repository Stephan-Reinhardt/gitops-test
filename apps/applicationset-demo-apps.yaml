apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-apps
  namespace: openshift-gitops
spec:
  generators:
    - list:
        elements:
          - name: region-a-poc-demo-nginx
            server: https://kubernetes.default.svc
            path: workloads/demo-nginx
          - name: region-a-test-demo-nginx
            server: https://api.ra-test.example.com:6443
            path: workloads/demo-nginx
          - name: region-a-poc-demo-keycloak
            server: https://kubernetes.default.svc
            path: workloads/demo-keycloak
          - name: region-a-test-demo-keycloak
            server: https://api.ra-test.example.com:6443
            path: workloads/demo-keycloak
  template:
    metadata:
      name: '{{name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/example/openshift-cluster-gitops-example.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: '{{server}}'
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
