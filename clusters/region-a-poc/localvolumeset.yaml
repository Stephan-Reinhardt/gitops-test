apiVersion: local.storage.openshift.io/v1alpha1
kind: LocalVolumeSet
metadata:
  name: localblock
  namespace: openshift-local-storage
spec:
  storageClassName: localblock
  volumeMode: Filesystem
  fsType: xfs
  maxDeviceCount: 3
  deviceInclusionSpec:
    deviceTypes:
      - disk
      - part
      - nvme
    minSize: 1Gi
    maxSize: 20Gi
  nodeSelector:
    nodeSelectorTerms:
      - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
              - cp-1
              - cp-2
              - cp-3