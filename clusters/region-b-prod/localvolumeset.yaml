apiVersion: local.storage.openshift.io/v1alpha1
kind: LocalVolumeSet
metadata:
  name: localblock
  namespace: openshift-local-storage
spec:
  storageClassName: localblock-rb
  volumeMode: Block
  deviceInclusionSpec:
    deviceTypes:
      - disk
      - nvme
    minSize: 500Gi
    maxSize: 8Ti
  nodeSelector:
    nodeSelectorTerms:
      - matchExpressions:
          - key: node-role.kubernetes.io/worker
            operator: Exists
          - key: storage-tier
            operator: In
            values:
              - local
  maxDeviceCount: 24
