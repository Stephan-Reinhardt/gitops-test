apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
spec:
  identityProviders:
    - name: corp-ldap
      mappingMethod: claim
      type: LDAP
      ldap:
        url: ldaps://ldap-rb.example.com/ou=users,dc=example,dc=com?uid?sub?(memberOf=cn=ocp-prod-users,ou=groups,dc=example,dc=com)
        bindDN: uid=openshift-bind-prod-rb,ou=svc,dc=example,dc=com
